<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Argentina 2026</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar el código directamente en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; /* Fondo muy oscuro para los costados */
            transition: background-color 0.3s ease;
        }
        .day-crossed {
            position: relative;
        }
        .day-crossed::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 10%;
            width: 80%;
            height: 2px;
            background-color: rgba(239, 68, 68, 0.7); /* Rojo semitransparente */
            transform: rotate(-45deg);
            pointer-events: none;
        }
        
        /* Transición suave para el tooltip */
        .tooltip-enter {
            opacity: 0;
            transform: translate(-50%, -90%) scale(0.95);
        }
        .tooltip-active {
            opacity: 1;
            transform: translate(-50%, -110%) scale(1);
            transition: opacity 0.15s ease-out, transform 0.15s ease-out;
        }
    </style>
</head>
<body class="text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const HOLIDAYS_DATA = [
            { date: '2026-01-01', type: 'inamovible', label: 'Jueves 1: Año Nuevo (feriado inamovible).' },
            { date: '2026-02-16', type: 'inamovible', label: 'Lunes 16: Carnaval (feriado inamovible).' },
            { date: '2026-02-17', type: 'inamovible', label: 'Martes 17: Carnaval (feriado inamovible).' },
            { date: '2026-03-23', type: 'turistico', label: 'Lunes 23: día no laborable con fines turísticos.' },
            { date: '2026-03-24', type: 'inamovible', label: 'Martes 24: Día Nacional de la Memoria por la Verdad y la Justicia (feriado inamovible).' },
            { date: '2026-04-02', type: 'inamovible', label: 'Jueves 2: Día del Veterano y de los Caídos en la Guerra de Malvinas (feriado inamovible) y coincidirá con el Jueves Santo (no laborable).' },
            { date: '2026-04-03', type: 'inamovible', label: 'Viernes 3: Viernes Santo (feriado inamovible).' },
            { date: '2026-04-27', type: 'inamovible', label: 'Lunes 27: Autonomía Provincial (Sde).' },
            { date: '2026-05-01', type: 'inamovible', label: 'Viernes 1: Día del Trabajador (feriado inamovible).' },
            { date: '2026-05-25', type: 'inamovible', label: 'Lunes 25: Día de la Revolución de Mayo (feriado inamovible).' },
            { date: '2026-06-15', type: 'trasladable', label: 'Lunes 15: Paso a la Inmortalidad del Gral. Güemes (trasladable del 17).' },
            { date: '2026-06-20', type: 'inamovible', label: 'Sábado 20: Paso a la Inmortalidad del General Manuel Belgrano.' },
            { date: '2026-07-09', type: 'inamovible', label: 'Jueves 9: Día de la Independencia (feriado inamovible).' },
            { date: '2026-07-10', type: 'turistico', label: 'Viernes 10: día no laborable con fines turísticos.' },
            { date: '2026-08-17', type: 'trasladable', label: 'Lunes 17: Paso a la Inmortalidad del Gral. San Martín.' },
            { date: '2026-10-12', type: 'trasladable', label: 'Lunes 12: Día del Respeto a la Diversidad Cultural.' },
            { date: '2026-11-23', type: 'trasladable', label: 'Lunes 23: Día de la Soberanía Nacional (trasladado del 20).' },
            { date: '2026-12-07', type: 'turistico', label: 'Lunes 7: día no laborable con fines turísticos.' },
            { date: '2026-12-08', type: 'inamovible', label: 'Martes 8: Inmaculada Concepción de María.' },
            { date: '2026-12-25', type: 'inamovible', label: 'Viernes 25: Navidad (feriado inamovible).' }
        ];

        const MONTHS = [
            "ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO",
            "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"
        ];

        const COLORS = {
            inamovible: "bg-[#ed1c24]",
            no_laborable: "bg-[#f7941d]",
            turistico: "bg-[#8cc63f]",
            trasladable: "bg-[#00aeef]"
        };

        const WEEK_DAYS = ["D", "L", "M", "M", "J", "V", "S"];

        const pad = (n) => String(n).padStart(2, '0');
        const toDateStr = (dateObj) => `${dateObj.getFullYear()}-${pad(dateObj.getMonth() + 1)}-${pad(dateObj.getDate())}`;
        const toShortDate = (dateObj) => `${pad(dateObj.getDate())}/${pad(dateObj.getMonth() + 1)}`;
        const HOLIDAY_SET = new Set(HOLIDAYS_DATA.map(h => h.date));

        const isBusinessDay = (dateObj) => {
            const day = dateObj.getDay();
            if (day === 0 || day === 6) return false;
            return !HOLIDAY_SET.has(toDateStr(dateObj));
        };

        const Month = ({ monthIdx, isDark, crossOutPast, onHoverDay, userNotes, onDayClick, lightWeekendText }) => {
            const year = 2026;
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const getDaysInMonth = (m) => new Date(year, m + 1, 0).getDate();
            const getFirstDayOfMonth = (m) => new Date(year, m, 1).getDay();

            const daysInMonth = getDaysInMonth(monthIdx);
            const firstDay = getFirstDayOfMonth(monthIdx);
            const blanks = Array(firstDay).fill(null);
            const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
            
            const monthHolidays = HOLIDAYS_DATA.filter(h => {
                const hDate = new Date(h.date + 'T00:00:00');
                return hDate.getMonth() === monthIdx;
            });

            const getTooltipText = (targetDate) => {
                const diffTime = targetDate.getTime() - today.getTime();
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays <= 0) return null;
                
                const weeks = Math.floor(diffDays / 7);
                const remainingDays = diffDays % 7;
                
                let text = "dentro de ";
                if (weeks > 0) {
                    text += `${weeks} ${weeks === 1 ? 'semana' : 'semanas'}`;
                    if (remainingDays > 0) text += ` y ${remainingDays} ${remainingDays === 1 ? 'día' : 'días'}`;
                } else {
                    text += `${remainingDays} ${remainingDays === 1 ? 'día' : 'días'}`;
                }
                
                return text;
            };

            return (
                <div className="flex flex-col mb-10 px-2 w-[250px]">
                    <h3 className={`text-2xl font-black mb-2 tracking-tight ${isDark ? 'text-white' : 'text-gray-800'}`}>
                        {MONTHS[monthIdx]}
                    </h3>
                    <div className={`grid grid-cols-7 gap-1 text-center font-bold text-xs mb-2 text-gray-400 border-b pb-1 ${isDark ? 'border-gray-700' : 'border-gray-100'}`}>
                        <div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div>
                    </div>
                    <div className="grid grid-cols-7 gap-1 text-center">
                        {blanks.map((_, i) => <div key={`b-${i}`} className="p-1"></div>)}
                        {days.map(day => {
                            const dateStr = `${year}-${String(monthIdx + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                            const holiday = HOLIDAYS_DATA.find(h => h.date === dateStr);
                            
                            const currentDayDate = new Date(year, monthIdx, day);
                            const dayOfWeek = currentDayDate.getDay();
                            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                            const isPast = currentDayDate < today;
                            const isToday = currentDayDate.getTime() === today.getTime();
                            const hasNotes = userNotes[dateStr] && userNotes[dateStr].length > 0;

                            const handleMouseEnter = (e) => {
                                if (holiday && !isPast) {
                                    const rect = e.currentTarget.getBoundingClientRect();
                                    onHoverDay({
                                        show: true,
                                        content: getTooltipText(currentDayDate),
                                        x: rect.left + rect.width / 2,
                                        y: rect.top
                                    });
                                }
                            };

                            const handleMouseLeave = () => {
                                onHoverDay(prev => ({ ...prev, show: false }));
                            };

                            return (
                                <div 
                                    key={day} 
                                    onClick={() => onDayClick(dateStr)}
                                    onMouseEnter={handleMouseEnter}
                                    onMouseLeave={handleMouseLeave}
                                    className={`group relative flex items-center justify-center p-1 h-8 w-8 mx-auto transition-all cursor-pointer ${crossOutPast && isPast ? 'day-crossed opacity-40' : ''}`}
                                >
                                    {holiday && (
                                        <div className={`absolute inset-0 rounded-full ${COLORS[holiday.type]} ${!isPast ? 'group-hover:scale-110 transition-transform' : ''}`}></div>
                                    )}
                                    {isToday && !holiday && (
                                        <div className={`absolute inset-0 rounded-full border-2 ${isDark ? 'border-gray-600' : 'border-gray-200'}`}></div>
                                    )}
                                    {/* Indicador de notas */}
                                    {hasNotes && (
                                        <div className="absolute top-0 right-0 w-2 h-2 bg-blue-500 rounded-full border border-white"></div>
                                    )}
                                    <span className={`relative text-sm font-bold ${holiday ? 'text-white' : (lightWeekendText && isWeekend ? 'text-gray-300' : (isDark ? 'text-gray-300' : 'text-gray-700'))}`}>
                                        {day}
                                    </span>
                                </div>
                            );
                        })}
                    </div>
                    
                    <div className="mt-4 space-y-1">
                        {monthHolidays.map((h, i) => (
                            <p key={i} className={`text-[10px] leading-tight text-left font-medium ${isDark ? 'text-gray-400' : 'text-gray-600'}`}>
                                {h.label}
                            </p>
                        ))}
                    </div>
                </div>
            );
        };

        const WeekView = ({ isDark, crossOutPast, userNotes, onDayClick, lightWeekendText, onHoverDay, hidePastPeriods }) => {
            const year = 2026;
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const weeks = useMemo(() => {
                const yearStart = new Date(year, 0, 1);
                const yearEnd = new Date(year, 11, 31);

                const rangeStart = new Date(yearStart);
                rangeStart.setDate(rangeStart.getDate() - rangeStart.getDay());

                const rangeEnd = new Date(yearEnd);
                rangeEnd.setDate(rangeEnd.getDate() + (6 - rangeEnd.getDay()));

                const data = [];
                const cursor = new Date(rangeStart);
                let weekNumber = 1;

                while (cursor <= rangeEnd) {
                    const weekStart = new Date(cursor);
                    const days = Array.from({ length: 7 }, (_, i) => {
                        const d = new Date(weekStart);
                        d.setDate(weekStart.getDate() + i);
                        const dateStr = toDateStr(d);
                        const holiday = HOLIDAYS_DATA.find(h => h.date === dateStr);
                        const inYear = d.getFullYear() === year;
                        const isPast = d < today;
                        const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                        return {
                            date: d,
                            dateStr,
                            dayOfMonth: d.getDate(),
                            inYear,
                            holiday,
                            isWeekend,
                            isPast,
                            isBusiness: inYear && isBusinessDay(d)
                        };
                    });

                    data.push({
                        weekNumber,
                        start: new Date(weekStart),
                        end: new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + 6),
                        days,
                        businessDays: days.filter(d => d.isBusiness).length,
                        holidays: days
                            .filter(d => d.inYear && d.holiday)
                            .map(d => ({
                                dateStr: d.dateStr,
                                label: d.holiday.label
                            }))
                    });

                    cursor.setDate(cursor.getDate() + 7);
                    weekNumber += 1;
                }

                return data;
            }, []);

            const visibleWeeks = hidePastPeriods
                ? weeks.filter(week => week.end >= today)
                : weeks;

            const buildHolidayTooltip = (weekHolidays) => {
                return weekHolidays
                    .map(h => `${MONTHS[parseInt(h.dateStr.split('-')[1], 10) - 1]}: ${h.label}`)
                    .join('\n');
            };

            const handleHolidayInfoMouseEnter = (e, weekHolidays) => {
                const rect = e.currentTarget.getBoundingClientRect();
                onHoverDay({
                    show: true,
                    content: buildHolidayTooltip(weekHolidays),
                    x: rect.left + rect.width / 2,
                    y: rect.top
                });
            };

            const handleHolidayInfoMouseLeave = () => {
                onHoverDay(prev => ({ ...prev, show: false }));
            };

            return (
                <div className="overflow-x-auto">
                    <div className={`mx-auto w-fit rounded-2xl border overflow-hidden ${isDark ? 'bg-[#232323] border-gray-800' : 'bg-white border-gray-100'}`}>
                    <div className={`grid grid-cols-[56px_repeat(7,38px)_72px] gap-2 p-3 border-b ${isDark ? 'border-gray-800 bg-[#1b1b1b]' : 'border-gray-100 bg-gray-50'}`}>
                        <div className={`text-[10px] font-black uppercase text-center self-center ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>Sem</div>
                        {WEEK_DAYS.map((d, i) => (
                            <div key={`head-${i}`} className={`text-[10px] font-black uppercase text-center self-center ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                                {d}
                            </div>
                        ))}
                        <div className={`text-[10px] font-black uppercase text-center self-center ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>Info</div>
                    </div>

                    <div className="space-y-2 p-3">
                        {visibleWeeks.map((week) => (
                            <article key={week.weekNumber} className={`grid grid-cols-[56px_repeat(7,38px)_72px] gap-2 rounded-xl border px-2 py-1 ${isDark ? 'bg-[#1f1f1f] border-gray-800' : 'bg-gray-50 border-gray-100'}`}>
                                <div className="flex items-center justify-center">
                                    <div className={`text-xs font-black px-2 py-1 rounded-lg ${isDark ? 'bg-[#2a2a2a] text-gray-100' : 'bg-white text-gray-700 border border-gray-200'}`}>
                                        {week.weekNumber}
                                    </div>
                                </div>

                                {week.days.map((d, idx) => {
                                    const hasNotes = userNotes[d.dateStr] && userNotes[d.dateStr].length > 0;

                                    return (
                                        <button
                                            key={`${week.weekNumber}-${d.dateStr}`}
                                            onClick={() => d.inYear && onDayClick(d.dateStr)}
                                            className={`relative h-12 text-center transition-all ${
                                                d.inYear
                                                ? 'cursor-pointer'
                                                : 'opacity-30 cursor-not-allowed'
                                            } ${
                                                crossOutPast && d.isPast ? 'day-crossed opacity-40' : ''
                                            }`}
                                            disabled={!d.inYear}
                                            title={`${WEEK_DAYS[idx]} ${d.dayOfMonth}/${pad(d.date.getMonth() + 1)}`}
                                        >
                                            {d.holiday && d.inYear && (
                                                <div className={`absolute inset-0 m-auto h-8 w-8 rounded-full ${COLORS[d.holiday.type]}`}></div>
                                            )}
                                            <div className={`relative text-sm font-black leading-[48px] ${d.holiday ? 'text-white' : (lightWeekendText && d.isWeekend ? 'text-gray-300' : (isDark ? 'text-gray-200' : 'text-gray-800'))}`}>
                                                {d.dayOfMonth}
                                            </div>
                                            {hasNotes && (
                                                <div className="absolute top-1 right-1 w-2 h-2 bg-blue-500 rounded-full border border-white"></div>
                                            )}
                                        </button>
                                    );
                                })}

                                <div className="flex items-center justify-center">
                                    {week.holidays.length > 0 ? (
                                        <button
                                            className={`px-1.5 py-1 rounded-lg text-[10px] font-bold ${isDark ? 'bg-[#2a2a2a] text-gray-100 hover:bg-[#333]' : 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-100'}`}
                                            onMouseEnter={(e) => handleHolidayInfoMouseEnter(e, week.holidays)}
                                            onMouseLeave={handleHolidayInfoMouseLeave}
                                        >
                                            {week.holidays.length} fer.
                                        </button>
                                    ) : (
                                        <span className={`text-[10px] font-bold ${isDark ? 'text-gray-500' : 'text-gray-400'}`}>
                                            -
                                        </span>
                                    )}
                                </div>
                            </article>
                        ))}
                    </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isDark, setIsDark] = useState(() => {
                const saved = localStorage.getItem('cal-theme');
                return saved ? JSON.parse(saved) : false;
            });
            
            const [crossOutPast, setCrossOutPast] = useState(() => {
                const saved = localStorage.getItem('cal-crossed');
                return saved ? JSON.parse(saved) : false;
            });

            const [calendarView, setCalendarView] = useState(() => {
                const saved = localStorage.getItem('cal-view');
                return saved || 'monthly';
            });

            const [lightWeekendText, setLightWeekendText] = useState(() => {
                const saved = localStorage.getItem('cal-light-weekends');
                return saved ? JSON.parse(saved) : false;
            });

            const [hidePastPeriods, setHidePastPeriods] = useState(() => {
                const saved = localStorage.getItem('cal-hide-past-periods');
                return saved ? JSON.parse(saved) : false;
            });

            const [userNotes, setUserNotes] = useState(() => {
                const saved = localStorage.getItem('cal-notes');
                return saved ? JSON.parse(saved) : {};
            });

            const [tooltip, setTooltip] = useState({ show: false, x: 0, y: 0, content: '' });
            const [selectedDate, setSelectedDate] = useState(null);
            const [noteInput, setNoteInput] = useState('');

            useEffect(() => {
                localStorage.setItem('cal-theme', JSON.stringify(isDark));
            }, [isDark]);

            useEffect(() => {
                localStorage.setItem('cal-crossed', JSON.stringify(crossOutPast));
            }, [crossOutPast]);

            useEffect(() => {
                localStorage.setItem('cal-view', calendarView);
            }, [calendarView]);

            useEffect(() => {
                localStorage.setItem('cal-light-weekends', JSON.stringify(lightWeekendText));
            }, [lightWeekendText]);

            useEffect(() => {
                localStorage.setItem('cal-hide-past-periods', JSON.stringify(hidePastPeriods));
            }, [hidePastPeriods]);

            useEffect(() => {
                localStorage.setItem('cal-notes', JSON.stringify(userNotes));
            }, [userNotes]);

            useEffect(() => {
                if (!selectedDate) return;

                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setSelectedDate(null);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [selectedDate]);

            const addNote = () => {
                if (!noteInput.trim()) return;
                const newNotes = { ...userNotes };
                if (!newNotes[selectedDate]) newNotes[selectedDate] = [];
                newNotes[selectedDate].push(noteInput.trim());
                setUserNotes(newNotes);
                setNoteInput('');
            };

            const deleteNote = (index) => {
                const newNotes = { ...userNotes };
                newNotes[selectedDate].splice(index, 1);
                if (newNotes[selectedDate].length === 0) delete newNotes[selectedDate];
                setUserNotes(newNotes);
            };

            const formatDate = (dateStr) => {
                if (!dateStr) return '';
                const [y, m, d] = dateStr.split('-');
                return `${d} de ${MONTHS[parseInt(m) - 1]} de ${y}`;
            };

            return (
                <div className="min-h-screen py-6 md:py-16 px-4">
                    
                    {/* Tooltip Personalizado Simple */}
                    <div 
                        className={`fixed z-50 px-2 py-1 rounded shadow-lg pointer-events-none whitespace-pre-line text-[10px] font-bold transition-opacity
                                   ${tooltip.show ? 'tooltip-active' : 'tooltip-enter'}
                                   ${isDark ? 'bg-gray-800 text-white border border-gray-700' : 'bg-gray-900 text-white'}`}
                        style={{ left: tooltip.x, top: tooltip.y }}
                    >
                        {tooltip.content}
                        <div className={`absolute left-1/2 -bottom-1 -translate-x-1/2 w-2 h-2 rotate-45 
                                        ${isDark ? 'bg-gray-800 border-r border-b border-gray-700' : 'bg-gray-900'}`}></div>
                    </div>

                    {/* Modal para Notas */}
                    {selectedDate && (
                        <div
                            className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
                            onClick={() => setSelectedDate(null)}
                        >
                            <div
                                className={`w-full max-w-md rounded-2xl shadow-2xl p-6 ${isDark ? 'bg-[#1e1e1e] border border-gray-800 text-white' : 'bg-white text-gray-900'}`}
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-black tracking-tight">{formatDate(selectedDate)}</h2>
                                    <button onClick={() => setSelectedDate(null)} className="p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full transition-colors">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                    </button>
                                </div>
                                
                                <div className="mb-6 max-h-48 overflow-y-auto space-y-2 pr-2">
                                    {userNotes[selectedDate] && userNotes[selectedDate].length > 0 ? (
                                        userNotes[selectedDate].map((note, idx) => (
                                            <div key={idx} className={`flex justify-between items-center p-3 rounded-xl border ${isDark ? 'bg-gray-800/50 border-gray-700' : 'bg-gray-50 border-gray-100'}`}>
                                                <span className="text-sm font-medium pr-2">{note}</span>
                                                <button onClick={() => deleteNote(idx)} className="text-red-500 hover:bg-red-50 p-1 rounded-lg transition-colors">
                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                                </button>
                                            </div>
                                        ))
                                    ) : (
                                        <p className="text-center text-sm text-gray-400 py-4 italic">No hay notas para este día</p>
                                    )}
                                </div>

                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        value={noteInput}
                                        onChange={(e) => setNoteInput(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && addNote()}
                                        placeholder="Agregar nota..."
                                        className={`flex-1 px-4 py-2 rounded-xl text-sm outline-none focus:ring-2 ring-blue-500/20 transition-all ${isDark ? 'bg-gray-800 border-gray-700 text-white' : 'bg-gray-100 border-transparent text-gray-900'}`}
                                    />
                                    <button 
                                        onClick={addNote}
                                        className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors"
                                    >
                                        Añadir
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className={`max-w-6xl mx-auto shadow-2xl rounded-sm overflow-hidden transition-colors duration-300 ${isDark ? 'bg-[#1e1e1e] border border-gray-800' : 'bg-white'}`}>
                        
                        <div className={`flex flex-wrap items-center justify-center gap-4 py-4 px-6 border-b ${isDark ? 'border-gray-800 bg-[#161616]' : 'bg-gray-50 border-gray-100'}`}>
                            <div className={`inline-flex rounded-full p-1 ${isDark ? 'bg-[#0f0f0f]' : 'bg-white border border-gray-200'}`}>
                                <button
                                    onClick={() => setCalendarView('monthly')}
                                    className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${calendarView === 'monthly' ? (isDark ? 'bg-white text-black' : 'bg-black text-white') : (isDark ? 'text-gray-300' : 'text-gray-600')}`}
                                >
                                    VISTA MENSUAL
                                </button>
                                <button
                                    onClick={() => setCalendarView('weekly')}
                                    className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${calendarView === 'weekly' ? (isDark ? 'bg-white text-black' : 'bg-black text-white') : (isDark ? 'text-gray-300' : 'text-gray-600')}`}
                                >
                                    VISTA SEMANAL
                                </button>
                            </div>

                            <button 
                                onClick={() => setCrossOutPast(!crossOutPast)}
                                className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${
                                    crossOutPast 
                                    ? 'bg-red-600 text-white' 
                                    : (isDark ? 'bg-gray-700 text-gray-300 hover:bg-gray-600' : 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50')
                                }`}
                            >
                                {crossOutPast ? "✓ DÍAS PASADOS TACHADOS" : "TACHAR DÍAS PASADOS"}
                            </button>
                            
                            <button 
                                onClick={() => setIsDark(!isDark)}
                                className={`px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2 transition-all ${
                                    isDark 
                                    ? 'bg-yellow-500 text-black' 
                                    : 'bg-black text-white'
                                }`}
                            >
                                {isDark ? "MODO CLARO" : "MODO OSCURO"}
                            </button>

                            <button 
                                onClick={() => setLightWeekendText(!lightWeekendText)}
                                className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${
                                    lightWeekendText 
                                    ? 'bg-slate-300 text-slate-900' 
                                    : (isDark ? 'bg-gray-700 text-gray-300 hover:bg-gray-600' : 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50')
                                }`}
                            >
                                {lightWeekendText ? "✓ FINDES EN GRIS CLARO" : "SÁBADOS Y DOMINGOS EN GRIS"}
                            </button>

                            <button 
                                onClick={() => setHidePastPeriods(!hidePastPeriods)}
                                className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${
                                    hidePastPeriods 
                                    ? 'bg-emerald-600 text-white' 
                                    : (isDark ? 'bg-gray-700 text-gray-300 hover:bg-gray-600' : 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50')
                                }`}
                            >
                                {calendarView === 'weekly'
                                    ? (hidePastPeriods ? "✓ SEMANAS PASADAS OCULTAS" : "OCULTAR SEMANAS PASADAS")
                                    : (hidePastPeriods ? "✓ MESES PASADOS OCULTOS" : "OCULTAR MESES PASADOS")}
                            </button>
                        </div>

                        <div className="p-6 md:p-16">
                            <header className="mb-12">
                                <h1 className={`text-6xl md:text-8xl font-black text-center mb-6 tracking-tighter uppercase ${isDark ? 'text-white' : 'text-black'}`}>
                                    Calendario 2026
                                </h1>

                                <div className={`grid grid-cols-2 md:grid-cols-4 gap-4 p-6 rounded-2xl border ${isDark ? 'bg-[#252525] border-gray-700' : 'bg-gray-50 border-gray-100'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-5 h-5 rounded-md ${COLORS.inamovible}`}></div>
                                        <span className={`text-[10px] font-black uppercase leading-none ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>Feriados<br/>Inamovibles</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-5 h-5 rounded-md ${COLORS.no_laborable}`}></div>
                                        <span className={`text-[10px] font-black uppercase leading-none ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>Días no<br/>laborables</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-5 h-5 rounded-md ${COLORS.turistico}`}></div>
                                        <span className={`text-[10px] font-black uppercase leading-none ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>Con fines<br/>turísticos</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-5 h-5 rounded-md ${COLORS.trasladable}`}></div>
                                        <span className={`text-[10px] font-black uppercase leading-none ${isDark ? 'text-gray-300' : 'text-gray-600'}`}>Feriados<br/>trasladables</span>
                                    </div>
                                </div>
                            </header>

                            {calendarView === 'monthly' ? (
                                <div className="flex flex-wrap justify-center gap-x-8 gap-y-4">
                                    {MONTHS.map((_, i) => {
                                        const today = new Date();
                                        today.setHours(0, 0, 0, 0);
                                        const endOfMonth = new Date(2026, i + 1, 0);
                                        endOfMonth.setHours(0, 0, 0, 0);
                                        if (hidePastPeriods && endOfMonth < today) return null;

                                        return (
                                            <Month 
                                                key={i} 
                                                monthIdx={i} 
                                                isDark={isDark} 
                                                crossOutPast={crossOutPast}
                                                onHoverDay={setTooltip}
                                                userNotes={userNotes}
                                                onDayClick={setSelectedDate}
                                                lightWeekendText={lightWeekendText}
                                            />
                                        );
                                    })}
                                </div>
                            ) : (
                                <WeekView
                                    isDark={isDark}
                                    crossOutPast={crossOutPast}
                                    userNotes={userNotes}
                                    onDayClick={setSelectedDate}
                                    lightWeekendText={lightWeekendText}
                                    onHoverDay={setTooltip}
                                    hidePastPeriods={hidePastPeriods}
                                />
                            )}

                            <footer className={`mt-20 border-t pt-10 ${isDark ? 'border-gray-800' : 'border-gray-100'}`}>
                                <div className="bg-[#d2a679] text-black font-bold text-center py-2 mb-6 tracking-widest text-[10px] rounded uppercase">
                                    Fuente: Ministerio del Interior
                                </div>
                                <div className="flex flex-col items-center">
                                    <div className={`px-5 py-1 text-3xl font-black italic tracking-tighter ${isDark ? 'bg-white text-black' : 'bg-black text-white'}`}>infobae</div>
                                    <p className="text-[10px] text-gray-400 mt-6 text-center max-w-md uppercase tracking-wider">
                                        Diseño replicado basándose en la comunicación oficial de Argentina.
                                    </p>
                                </div>
                            </footer>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
